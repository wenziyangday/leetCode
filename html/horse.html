<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>抖音小游戏：斑斓马特效预览</title>
  <style>
		body { margin: 0; background: #050510; overflow: hidden; color: white; font-family: sans-serif; }
		canvas { display: block; }
		.ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
		.hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #666; }
  </style>
</head>
<body>
<div class="ui">
  <h2>点燃斑斓马烟花</h2>
  <p>金币: <span id="gold">199,003</span></p>
</div>
<div class="hint">点击屏幕任意位置释放烟花</div>
<canvas id="gameCanvas"></canvas>

<script>
	const canvas = document.getElementById('gameCanvas');
	const ctx = canvas.getContext('2d');
	let width, height;
	let particles = [];
	const goldEl = document.getElementById('gold');

	// 响应式画布
	function resize() {
		width = canvas.width = window.innerWidth;
		height = canvas.height = window.innerHeight;
	}
	window.addEventListener('resize', resize);
	resize();

	// 粒子类
	class Particle {
		constructor(targetX, targetY, color) {
			// 初始位置在爆炸中心（暂定点击点）
			this.x = mouseX;
			this.y = mouseY;
			// 目标位置（马的形状坐标）
			this.tx = targetX;
			this.ty = targetY;
			// 初始速度（向外炸开）
			const angle = Math.random() * Math.PI * 2;
			const force = Math.random() * 15;
			this.vx = Math.cos(angle) * force;
			this.vy = Math.sin(angle) * force;

			this.color = color;
			this.friction = 0.95; // 摩擦力
			this.ease = 0.05 + Math.random() * 0.05; // 聚合速度
			this.state = 'exploding'; // exploding -> gathering
			this.size = Math.random() * 2 + 1;

			// 延迟聚合成马
			setTimeout(() => this.state = 'gathering', 800);
		}

		update() {
			if (this.state === 'exploding') {
				this.x += this.vx;
				this.y += this.vy;
				this.vx *= this.friction;
				this.vy *= this.friction;
			} else {
				// 移向目标点
				this.x += (this.tx - this.x) * this.ease;
				this.y += (this.ty - this.y) * this.ease;
			}
		}

		draw() {
			ctx.fillStyle = this.color;
			ctx.beginPath();
			ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
			ctx.fill();
		}
	}

	// 获取马的形状点阵 (简易模拟采样)
	function getHorsePoints(centerX, centerY) {
		const points = [];
		// 这里使用一个简单的几何组合模拟马的轮廓
		// 在实际开发中，你会用 ctx.getImageData 扫描一张马的图片
		for (let i = 0; i < 400; i++) {
			const t = Math.random() * 10;
			// 简单的数学公式勾勒出马的大致躯干和头部
			let px = (Math.sin(t) * Math.cos(t) * 150);
			let py = (Math.sin(t) * 100) - (Math.abs(px) * 0.5);

			// 增加斑斓的色相
			const hue = (t * 50) % 360;
			points.push({
				x: centerX + px,
				y: centerY + py - 50,
				color: `hsl(${hue}, 80%, 60%)`
			});
		}
		return points;
	}

	let mouseX, mouseY;

	canvas.addEventListener('click', (e) => {
		mouseX = e.clientX;
		mouseY = e.clientY;

		// 1. 生成马的点阵
		const horseShape = getHorsePoints(mouseX, mouseY);

		// 2. 创建粒子
		horseShape.forEach(p => {
			particles.push(new Particle(p.x, p.y, p.color));
		});

		// 模拟金币增加
		let currentGold = parseInt(goldEl.innerText.replace(/,/g, ''));
		goldEl.innerText = (currentGold + 50).toLocaleString();
	});

	function animate() {
		// 拖尾效果：不完全清除上一帧
		ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
		ctx.fillRect(0, 0, width, height);

		// 混合模式让颜色更斑斓
		ctx.globalCompositeOperation = 'lighter';

		particles.forEach((p, index) => {
			p.update();
			p.draw();
			// 简单的生命周期控制
			if (p.state === 'gathering' && Math.abs(p.x - p.tx) < 1) {
				// 停留一会儿后消失
				// particles.splice(index, 1);
			}
		});

		ctx.globalCompositeOperation = 'source-over';
		requestAnimationFrame(animate);
	}

	animate();
</script>
</body>
</html>
