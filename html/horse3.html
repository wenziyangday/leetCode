<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斑斓马粒子特效 Demo</title>
  <style>
		body {
			margin: 0;
			overflow: hidden;
			background-color: #050510; /* 深色背景衬托发光 */
			cursor: crosshair;
		}
		canvas {
			display: block;
		}
		.hint {
			position: absolute;
			bottom: 20px;
			width: 100%;
			text-align: center;
			color: rgba(255, 255, 255, 0.5);
			font-family: sans-serif;
			pointer-events: none;
		}
  </style>
</head>
<body>
<div class="hint">点击屏幕任意位置，释放斑斓马特效</div>
<canvas id="canvas"></canvas>

<script>
	const canvas = document.getElementById('canvas');
	const ctx = canvas.getContext('2d');

	let width, height;
	let particles = [];
	let horseTargetPoints = []; // 存储马形状的目标点

	// 1. 初始化画布尺寸
	function resize() {
		width = canvas.width = window.innerWidth;
		height = canvas.height = window.innerHeight;
		// 重新生成目标点以适应屏幕中心
		generateHorsePoints(width / 2, height / 2 - 50);
	}
	window.addEventListener('resize', resize);

	// 2. [关键] 生成马形状的目标点数据
	// 在实际项目中，这里应该替换为读取一张马的PNG图片的像素坐标
	// 这里为了演示，用数学公式生成一个大致的马形轮廓
	function generateHorsePoints(centerX, centerY) {
		horseTargetPoints = [];
		const scale = Math.min(width, height) / 600; // 根据屏幕缩放大小

		for (let i = 0; i < 1200; i++) { // 粒子总数
			const t = (i / 1200) * Math.PI * 2;
			// 一个简单的模拟马躯干和头部的参数方程
			let x = Math.cos(t) * 160 * scale;
			let y = Math.sin(t) * 60 * scale;

			// 头部和颈部偏移
			if (t > 3.5 && t < 5.5) {
				x -= 60 * scale;
				y -= (80 + Math.sin(t*5)*20) * scale;
			}
			// 腿部及鬃毛的随机散布感
			x += (Math.random() - 0.5) * 20 * scale;
			y += (Math.random() - 0.5) * 20 * scale;

			horseTargetPoints.push({
				x: centerX + x,
				y: centerY + y,
				// 为每个点预设一个基础色相，实现色彩渐变流动
				baseHue: (x / width) * 360 + (y/height)*180
			});
		}
	}

	// 3. 粒子类定义
	class Particle {
		constructor(startX, startY, targetIdx) {
			this.x = startX;
			this.y = startY;
			// 初始爆炸速度
			const angle = Math.random() * Math.PI * 2;
			const speed = Math.random() * 15 + 5;
			this.vx = Math.cos(angle) * speed;
			this.vy = Math.sin(angle) * speed;

			this.targetIdx = targetIdx; // 记住自己要去哪个目标点
			this.radius = Math.random() * 1.5 + 0.8; // 粒子大小差异
			this.friction = 0.94; // 爆炸时的空气阻力
			this.ease = 0.04 + Math.random() * 0.02; // 聚合成形时的平滑系数
			this.state = 'exploding'; // 当前状态
			this.hueOffset = 0; // 色相动态偏移量
		}

		update() {
			const target = horseTargetPoints[this.targetIdx];

			if (this.state === 'exploding') {
				// 爆炸阶段：应用速度和摩擦力
				this.x += this.vx;
				this.y += this.vy;
				this.vx *= this.friction;
				this.vy *= this.friction;
				// 速度足够慢时，切换为聚合状态
				if (Math.abs(this.vx) + Math.abs(this.vy) < 1) {
					this.state = 'forming';
				}
			} else {
				// 聚合阶段：平滑飞向目标点 (Lerp算法)
				this.x += (target.x - this.x) * this.ease;
				this.y += (target.y - this.y) * this.ease;
			}

			// 让颜色动起来
			this.hueOffset += 1.5;
		}

		draw() {
			const target = horseTargetPoints[this.targetIdx];
			// [关键] 使用HSL颜色，实现斑斓效果
			const hue = (target.baseHue + this.hueOffset) % 360;
			// 饱和度100%，亮度60%保证鲜艳
			ctx.fillStyle = `hsla(${hue}, 100%, 60%, 1)`;

			ctx.beginPath();
			ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
			ctx.fill();
		}
	}

	// 4. 点击触发
	canvas.addEventListener('mousedown', (e) => {
		particles = []; // 清空旧粒子
		// 为每个目标点生成一个起始粒子
		for (let i = 0; i < horseTargetPoints.length; i++) {
			particles.push(new Particle(e.clientX, e.clientY, i));
		}
	});

	// 5. 动画主循环
	function animate() {
		// 使用半透明黑色清空画布，制造拖尾效果
		ctx.fillStyle = 'rgba(5, 5, 16, 0.2)';
		ctx.fillRect(0, 0, width, height);

		// [核心重点] 设置混合模式为 'lighter'，实现发光叠加效果
		ctx.globalCompositeOperation = 'lighter';

		particles.forEach(p => {
			p.update();
			p.draw();
		});

		// 恢复默认混合模式以绘制背景
		ctx.globalCompositeOperation = 'source-over';

		requestAnimationFrame(animate);
	}

	// 启动
	resize();
	animate();

</script>
</body>
</html>
