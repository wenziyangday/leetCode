<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>斑斓马：特效演示原型</title>
  <style>
		/* --- 模拟 assets/style.css --- */
		body {
			margin: 0;
			overflow: hidden;
			background-color: #020205; /* 深邃夜空黑 */
			font-family: 'PingFang SC', sans-serif;
			touch-action: none; /* 禁止移动端默认缩放 */
		}

		/* UI 层 */
		#ui-layer {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 10;
		}

		.header {
			position: absolute;
			top: 20px;
			left: 20px;
			color: white;
		}

		.gold-box {
			display: flex;
			align-items: center;
			background: rgba(255, 255, 255, 0.1);
			backdrop-filter: blur(5px);
			padding: 8px 16px;
			border-radius: 20px;
			border: 1px solid rgba(255, 215, 0, 0.3);
		}

		.gold-icon {
			font-size: 20px;
			margin-right: 8px;
		}

		.gold-num {
			font-size: 18px;
			font-weight: bold;
			color: #FFD700;
			font-family: monospace;
		}

		.hint-text {
			position: absolute;
			bottom: 10%;
			width: 100%;
			text-align: center;
			color: rgba(255, 255, 255, 0.5);
			font-size: 14px;
			animation: pulse 2s infinite;
		}

		@keyframes pulse {
			0% { opacity: 0.3; }
			50% { opacity: 0.8; }
			100% { opacity: 0.3; }
		}

		canvas {
			display: block;
			z-index: 1;
		}
  </style>
</head>
<body>

<div id="ui-layer">
  <div class="header">
    <div class="gold-box">
      <span class="gold-icon">💰</span>
      <span class="gold-num" id="gold-display">0</span>
    </div>
  </div>
  <div class="hint-text">
    点击屏幕点燃烟花<br>
    <span style="font-size:12px">长按可连续释放</span>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
	/**
	 * ============================================================
	 * 模块 1: src/data/HorseData.js
	 * 负责生成马的形态数据。在实际项目中，这里会读取 JSON 文件。
	 * ============================================================
	 */
	const HorseModel = {
		// 生成某一帧的粒子点阵
		// frameIndex: 0-10 之间的浮点数，用于模拟奔跑动作
		getPoints: function(frameIndex, scale = 1) {
			const points = [];
			const numPoints = 1200; // 粒子密度

			// 模拟奔跑的周期 (0 ~ 2PI)
			const t_cycle = (frameIndex % 10) / 10 * Math.PI * 2;

			for (let i = 0; i < numPoints; i++) {
				const t = (i / numPoints) * Math.PI * 2;

				// --- 数学建模马的轮廓 (参数方程模拟) ---

				// 1. 躯干 (椭圆变形)
				let x = Math.cos(t) * 120;
				let y = Math.sin(t) * 50;

				// 2. 头部 (Head)
				if (t > 3.0 && t < 4.5) {
					x -= 60;
					y -= 60 + Math.sin(t * 10) * 10;
					// 抬头低头动作
					y += Math.sin(t_cycle) * 5;
				}

				// 3. 腿部 (Legs) - 模拟奔跑的关键
				// 通过正弦波模拟四条腿的交替摆动
				if (t > 0.5 && t < 2.5) {
					// 后腿
					x += Math.sin(t * 5 + t_cycle) * 30;
					y += Math.abs(Math.cos(t * 3 + t_cycle)) * 40;
				}
				if (t > 4.5 && t < 5.5) {
					// 前腿
					x += Math.sin(t * 8 - t_cycle) * 20;
					y += Math.abs(Math.cos(t * 5 - t_cycle)) * 50;
				}

				// 4. 尾巴 (Tail)
				if (t > 5.8 || t < 0.2) {
					x += 80;
					y -= 10;
					// 尾巴随风摆动
					x += Math.sin(y * 0.1 + t_cycle * 2) * 10;
				}

				// --- 细节处理 ---
				// 随机抖动 (Jitter) 模拟火焰/粒子边缘的不规则感
				x += (Math.random() - 0.5) * 5;
				y += (Math.random() - 0.5) * 5;

				points.push({
					x: x * scale,
					y: y * scale,
					// 根据部位分配颜色偏移 (头部偏金，尾部偏紫)
					colorOffset: (x / 100) * 60
				});
			}
			return points;
		}
	};

	/**
	 * ============================================================
	 * 模块 2: src/effects/Particle.js
	 * 粒子类：控制单个光点的物理运动和生命周期
	 * ============================================================
	 */
	class Particle {
		constructor(x, y, targetIdx) {
			// 初始位置 (发射点)
			this.x = x;
			this.y = y;

			// 物理属性
			const angle = Math.random() * Math.PI * 2;
			const speed = Math.random() * 15 + 5; // 爆炸初速度
			this.vx = Math.cos(angle) * speed;
			this.vy = Math.sin(angle) * speed;
			this.friction = 0.92; // 阻力

			// 目标属性
			this.targetIdx = targetIdx; // 这个粒子对应马身上的哪个点
			this.ease = 0.05 + Math.random() * 0.05; // 归位平滑度

			// 外观属性
			this.alpha = 1;
			this.hue = Math.random() * 360;
			this.size = Math.random() * 2 + 1;

			// 状态机: EXPLODE(爆炸) -> FORMING(聚形) -> FADING(消失)
			this.state = 'EXPLODE';
			this.life = 0;
		}

		update(targetPoint, centerX, centerY) {
			this.life++;

			// 1. 爆炸阶段
			if (this.state === 'EXPLODE') {
				this.x += this.vx;
				this.y += this.vy;
				this.vx *= this.friction;
				this.vy *= this.friction;

				// 当速度足够慢，或者时间到了，开始聚合成马
				if (Math.abs(this.vx) < 0.5 || this.life > 30) {
					this.state = 'FORMING';
				}
			}
			// 2. 聚形阶段 (变成马)
			else if (this.state === 'FORMING') {
				// 计算这个粒子在马身上的绝对坐标
				const tx = centerX + targetPoint.x;
				const ty = centerY + targetPoint.y;

				// Lerp 插值：平滑飞向目标
				this.x += (tx - this.x) * this.ease;
				this.y += (ty - this.y) * this.ease;

				// 颜色流动效果 (斑斓感核心)
				// 基础色相 + 位置偏移 + 时间流动
				this.hue = 200 + targetPoint.colorOffset + (this.life * 2);

				// 偶尔产生“火星脱落”效果
				if (Math.random() < 0.01) {
					this.size = 4; // 闪烁一下
				} else {
					this.size = Math.random() * 2 + 1;
				}
			}
		}

		draw(ctx) {
			// 使用 HSL 颜色模式实现霓虹光感
			ctx.fillStyle = `hsla(${this.hue % 360}, 100%, 60%, ${this.alpha})`;
			ctx.beginPath();
			ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
			ctx.fill();
		}
	}

	/**
	 * ============================================================
	 * 模块 3: src/main.js
	 * 游戏主逻辑
	 * ============================================================
	 */
	const canvas = document.getElementById('gameCanvas');
	const ctx = canvas.getContext('2d');
	const uiGold = document.getElementById('gold-display');

	let width, height;
	let particles = [];
	let horseFrameData = [];
	let animationTime = 0;
	let userGold = 0;

	// 初始化
	function init() {
		resize();
		window.addEventListener('resize', resize);

		// 交互事件
		canvas.addEventListener('pointerdown', handleInput);

		// 启动主循环
		loop();
	}

	function resize() {
		width = canvas.width = window.innerWidth;
		height = canvas.height = window.innerHeight;
	}

	// 处理点击/触摸
	function handleInput(e) {
		const startX = e.clientX;
		const startY = e.clientY;

		// 增加金币 (模拟拾取或奖励)
		userGold += Math.floor(Math.random() * 50) + 10;
		uiGold.textContent = userGold.toLocaleString();

		createExplosion(startX, startY);
	}

	// 创建一组烟花粒子
	function createExplosion(x, y) {
		// 每次爆炸生成 1200 个粒子
		const particleCount = 1200;

		// 清除旧的(为了性能演示，实际可保留多组)
		if (particles.length > 3000) particles = particles.slice(1000);

		for (let i = 0; i < particleCount; i++) {
			particles.push(new Particle(x, y, i));
		}
	}

	// 游戏主循环 (每秒约60帧)
	function loop() {
		// 1. 绘制背景 (带拖尾效果)
		ctx.fillStyle = 'rgba(2, 2, 5, 0.2)'; // 透明度越低拖尾越长
		ctx.fillRect(0, 0, width, height);

		// 2. 开启发光混合模式 (关键！让粒子重叠处变亮)
		ctx.globalCompositeOperation = 'lighter';

		// 3. 更新马的动画帧数据
		animationTime += 0.2; // 控制奔跑速度
		// 实时获取当前动作帧的点阵
		const currentHorsePoints = HorseModel.getPoints(animationTime, width < 500 ? 0.8 : 1.2);

		// 屏幕中心
		const cx = width / 2;
		const cy = height / 2 - 50;

		// 4. 更新并绘制所有粒子
		for (let i = 0; i < particles.length; i++) {
			const p = particles[i];

			// 确保粒子索引不越界
			const targetPoint = currentHorsePoints[p.targetIdx % currentHorsePoints.length];

			p.update(targetPoint, cx, cy);
			p.draw(ctx);
		}

		// 恢复混合模式
		ctx.globalCompositeOperation = 'source-over';

		requestAnimationFrame(loop);
	}

	// 启动游戏
	init();

</script>
</body>
</html>
