<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>卫生间</title>

  <style>
      * {
          margin: 0;
          padding: 0;
      }

      .weishengjian {
          margin-top: 100px;
          margin-left: 100px;
          width: 158px;
          height: 320px;
          background: #ccccff;
      }

      .shiqu {
          position: relative;
          width: 158px;
          height: 180px;
          background: #4387fd;
      }

      .lianpengtou {
          float: right;
          width: 28px;
          height: 54px;
          background: #c3c3c3;
      }

      .zhuan {
          float: left;
          width: 40px;
          height: 80px;
          background: rgba(255, 0, 0, .2);
          border-right: 2.5px solid #000000;
          border-top: 2.5px solid #000000;
      }

      .hover-zhuan {
          position: absolute;
          width: calc(158px + 12px);
          left: 0;
          bottom: 0;
          border-left: 2.5px solid #000000;
      }
  </style>
</head>
<body>

<div class="wrap">
  <div class="weishengjian">
    <div class="shiqu">
      <div class="lianpengtou">
        ll
      </div>
      <div class="hover-zhuan">
        <div class="zhuan">1</div>
        <div class="zhuan">2</div>
        <div class="zhuan">3</div>
        <div class="zhuan">4</div>
        <div class="zhuan">5</div>
        <div class="zhuan">6</div>
        <div class="zhuan">7</div>
        <div class="zhuan">8</div>
        <div class="zhuan">9</div>
        <div class="zhuan">10</div>
        <div class="zhuan">11</div>
        <div class="zhuan">12</div>
      </div>
    </div>
    <div class="qiang">qiang</div>
    <div class="ganqu">ganqu</div>
  </div>
</div>


</body>
</html>
