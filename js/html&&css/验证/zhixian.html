		}

		@keyframes myOpacity {
			from {
				opacity: 0;
			}

			}
		}

<script>
	/**
	 * 事件分发系统（一个对象）
	 * 其拥有 三个方法 on emit remove
	 * */
	class CustomDispatchEvent {
		constructor() {
			this.events = {}
		}

		on(event, cb) {
			if (!this.events[event]) {
				this.events[event] = []
			}
			this.events[event].push(cb);
		}

		// 触发一个
		emit(event, ...args) {
			if (this.events[event]) {
				this.events[event].forEach(cb => {
					cb(...args);
				})
			}
		}

		// 移除事件监听
		remove(event) {
			if (this.events[event]) {
				this.events[event] = []
			}
		}
	}

	const emmiter = new CustomDispatchEvent();

	function cb(...args) {
		console.log('callback', args);
	}

	emmiter.on('customEvent', cb);
	emmiter.emit('customEvent', 'test');

</script>

<script>
	function getMaxProfit(costProfit, oil) {
		// 初始化动态规划表
		let dp = new Array(costProfit.length + 1).fill(0).map(() => new Array(oil + 1).fill(0));

		for (let i = 1; i <= costProfit.length; i++) {
			let [cost, profit] = costProfit[i - 1];
			for (let j = 1; j <= oil; j++) {
				dp[i][j] = dp[i - 1][j];
				if (j >= cost) {
				  // 比较收割和不收割两种情况，选择收益更大的那个
					dp[i][j] = Math.max(dp[i][j], dp[i - 1][j - cost] + profit);
				}
			}
		}

		return dp[costProfit.length][oil];
	}
	const dps = [[1, 1], [7, 9], [6, 10], [2, 4], [3, 5], [6, 10]];
	let maxProfit = getMaxProfit(dps, 10);
	console.log(maxProfit);
</script>
