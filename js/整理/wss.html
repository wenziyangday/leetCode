<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>websocket</title>
  <script src="wss.js"></script>
</head>
<body>


<ul id="ul">
  <li>1*10</li>
  <li>2*10</li>
  <li>3*10</li>
  <li>4*10</li>
  <li>5*10</li>
  <li>6*10</li>
  <li>7*10</li>
  <li>8*10</li>
  <li>9*10</li>
  <li>10*10</li>
</ul>

<script>
  const socket = new MyWebSocket('ws://127.0.0.1:8001', function (res) {
    console.log(res, 'lkkl')
  });

  document.querySelector('#ul').addEventListener('click', function (res) {
    socket.sendMsg({
      id: Math.random(),
      name: res.target.innerHTML,
      data: {
        id: Math.random(),
        name: res.target.innerHTML,
      }
    });
  });
</script>


</body>
</html>
